<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Exam Quiz — UPSC, BPSC, SSC & More</title>
<style>
:root{
  --bg:#070d1a;--bg2:#0d1525;--bg3:#111d30;
  --blue:#2563eb;--blue2:#3b82f6;--gold:#f59e0b;
  --green:#22c55e;--red:#ef4444;--purple:#a855f7;
  --text:#f1f5f9;--muted:#4b6a8a;--border:#1e3a5f;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;padding-bottom:50px;}

/* HEADER */
.header{background:linear-gradient(135deg,#0d1f3c,#070d1a);padding:20px;border-bottom:1px solid var(--border);}
.header-inner{max-width:720px;margin:0 auto;}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.logo-icon{font-size:2.2rem;}
.app-title{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.app-sub{font-size:0.8rem;color:var(--muted);margin-top:2px;}
.ai-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);border-radius:20px;padding:4px 12px;font-size:0.72rem;font-weight:700;color:#c084fc;letter-spacing:0.06em;margin-top:8px;}
.ai-dot{width:7px;height:7px;border-radius:50%;background:#a855f7;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}

/* MAIN */
.main{max-width:720px;margin:0 auto;padding:20px;}

/* EXAM SELECTOR */
.selector-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
.selector-title{font-size:0.95rem;font-weight:700;color:#93c5fd;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.search-wrap{position:relative;margin-bottom:16px;}
.search-input{width:100%;padding:13px 16px 13px 44px;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;font-family:'Segoe UI',sans-serif;outline:none;transition:all 0.25s;}
.search-input:focus{border-color:var(--blue2);}
.search-input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none;}
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.exam-btn{padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:#94a3b8;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;}
.exam-btn:hover{border-color:var(--blue2);color:var(--text);background:#0f1f3a;}
.exam-btn.active{border-color:var(--blue2);background:rgba(37,99,235,0.15);color:#60a5fa;}
.exam-btn .exam-icon{font-size:1.2rem;display:block;margin-bottom:4px;}
.exam-btn .exam-name{font-size:0.75rem;}

/* SETTINGS ROW */
.settings-row{display:flex;gap:10px;flex-wrap:wrap;}
.setting-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:150px;}
.setting-label{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
.setting-select{padding:9px 12px;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:0.85rem;font-family:'Segoe UI',sans-serif;outline:none;cursor:pointer;transition:border-color 0.2s;}
.setting-select:focus{border-color:var(--blue2);}

/* START BTN */
.start-btn{width:100%;margin-top:16px;padding:14px;border-radius:8px;border:none;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 20px rgba(37,99,235,0.3);display:flex;align-items:center;justify-content:center;gap:8px;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,99,235,0.5);}
.start-btn:disabled{opacity:0.5;cursor:default;transform:none;}

/* QUIZ AREA */
.quiz-area{display:none;}
.quiz-header{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.quiz-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.exam-tag{background:rgba(37,99,235,0.2);border:1px solid rgba(37,99,235,0.4);border-radius:20px;padding:4px 12px;font-size:0.78rem;font-weight:700;color:#60a5fa;}
.diff-tag{border-radius:20px;padding:4px 12px;font-size:0.75rem;font-weight:700;}
.diff-easy{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#4ade80;}
.diff-medium{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;}
.diff-hard{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.score-display{display:flex;gap:12px;}
.sc{font-size:0.85rem;font-weight:700;}
.sc.g{color:var(--green);}
.sc.r{color:var(--red);}
.sc.b{color:#60a5fa;}
.progress-wrap{margin-bottom:16px;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:width 0.4s;}
.progress-text{font-size:0.75rem;color:var(--muted);margin-top:5px;text-align:right;}

/* LOADING */
.loading-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:40px 24px;text-align:center;}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:1rem;color:#93c5fd;font-weight:600;margin-bottom:6px;}
.loading-sub{font-size:0.82rem;color:var(--muted);}
.ai-thinking{display:flex;justify-content:center;gap:6px;margin-top:14px;}
.ai-thinking span{width:8px;height:8px;border-radius:50%;background:#7c3aed;animation:bounce 1.2s infinite;}
.ai-thinking span:nth-child(2){animation-delay:0.2s;}
.ai-thinking span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* QUESTION CARD */
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.q-card-top{padding:18px 20px 14px;border-top:3px solid var(--blue2);}
.q-num-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.q-num{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.q-topic{font-size:0.7rem;font-weight:600;padding:2px 9px;border-radius:10px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;}
.q-text{font-size:1rem;font-weight:600;color:#f1f5f9;line-height:1.55;}
.q-options{padding:0 20px 18px;display:flex;flex-direction:column;gap:8px;}
.opt{padding:11px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:#cbd5e1;font-size:0.88rem;cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:12px;width:100%;}
.opt:hover:not(:disabled){border-color:var(--blue2);background:#0f1f3a;color:var(--text);}
.opt.selected{border-color:var(--blue2);background:rgba(37,99,235,0.12);color:var(--text);}
.opt.correct{border-color:var(--green)!important;background:rgba(34,197,94,0.1)!important;color:#4ade80!important;}
.opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,0.1)!important;color:#f87171!important;}
.opt:disabled{cursor:default;}
.opt-letter{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;transition:all 0.2s;}
.opt.selected .opt-letter{background:var(--blue2);color:#fff;}
.opt.correct .opt-letter{background:var(--green);color:#fff;}
.opt.wrong .opt-letter{background:var(--red);color:#fff;}
.q-explanation{margin:0 20px 16px;background:#0d1f3c;border:1px solid rgba(99,102,241,0.3);border-radius:8px;padding:12px 15px;font-size:0.84rem;color:#a5b4fc;line-height:1.65;}
.q-explanation strong{color:#c084fc;}
.action-row{padding:0 20px 20px;display:flex;gap:10px;}
.submit-btn{flex:1;padding:12px;border-radius:8px;border:none;color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#2563eb,#7c3aed);transition:all 0.2s;box-shadow:0 3px 12px rgba(37,99,235,0.3);}
.submit-btn:hover{transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.next-btn{flex:1;padding:12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:#93c5fd;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.next-btn:hover{border-color:var(--blue2);background:#0f1f3a;}
.skip-btn{padding:11px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.82rem;cursor:pointer;transition:all 0.2s;}
.skip-btn:hover{color:#94a3b8;}

/* STREAK */
.streak-banner{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.1));border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:10px 16px;margin-bottom:14px;font-size:0.85rem;color:#fbbf24;display:flex;align-items:center;gap:8px;}

/* RESULT */
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:30px 24px;text-align:center;}
.result-emoji{font-size:3.5rem;margin-bottom:10px;}
.result-title{font-size:1.3rem;font-weight:700;margin-bottom:6px;}
.result-pct{font-size:3.5rem;font-weight:800;margin:14px 0;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0;}
.rg{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center;}
.rg-num{font-size:1.7rem;font-weight:700;display:block;}
.rg-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:3px;display:block;}
.result-btns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.result-btn{flex:1;padding:12px;border-radius:8px;border:none;font-size:0.88rem;font-weight:700;cursor:pointer;min-width:130px;}
.rb-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;}
.rb-secondary{background:var(--bg3);border:1.5px solid var(--border);color:#93c5fd;}

/* ERROR */
.error-card{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:14px 18px;margin-bottom:14px;font-size:0.88rem;color:#f87171;}

/* BACK BTN */
.back-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:7px;font-size:0.82rem;cursor:pointer;margin-bottom:16px;transition:all 0.2s;}
.back-btn:hover{border-color:var(--blue2);color:#93c5fd;}

@media(max-width:600px){
  .exam-grid{grid-template-columns:repeat(3,1fr);}
  .result-grid{grid-template-columns:repeat(2,1fr);}
  .settings-row{flex-direction:column;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-row">
      <div class="logo-icon">🎯</div>
      <div>
        <div class="app-title">AI Exam Quiz</div>
        <div class="app-sub">Real-time AI generated questions for any exam</div>
      </div>
    </div>
    <div class="ai-badge"><div class="ai-dot"></div> Powered by Claude AI — Unlimited Questions</div>
  </div>
</div>

<div class="main">
  <!-- SELECTOR -->
  <div id="selectorArea">
    <div class="selector-card">
      <div class="selector-title">📋 Exam Chuniye ya Search Karein</div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="examInput" placeholder="Koi bhi exam likhein — UPSC, BPSC, SSC, Railway, Police..." oninput="filterExams(this.value)">
      </div>

      <div class="exam-grid" id="examGrid">
        <!-- filled by JS -->
      </div>

      <div class="settings-row">
        <div class="setting-group">
          <div class="setting-label">Difficulty</div>
          <select class="setting-select" id="diffSelect">
            <option value="easy">🟢 Aasaan (Prelims)</option>
            <option value="medium" selected>🟡 Madhyam (Mains)</option>
            <option value="hard">🔴 Kathin (Advanced)</option>
            <option value="mixed">🎲 Mixed</option>
          </select>
        </div>
        <div class="setting-group">
          <div class="setting-label">Topic / Subject</div>
          <select class="setting-select" id="topicSelect">
            <option value="all">📚 Sab Topics</option>
            <option value="history">🏛️ Itihas (History)</option>
            <option value="geography">🌍 Bhugol (Geography)</option>
            <option value="polity">⚖️ Rajvyavastha (Polity)</option>
            <option value="economy">💰 Arthvyavastha (Economy)</option>
            <option value="science">🔬 Vigyan (Science)</option>
            <option value="current affairs">📰 Current Affairs</option>
            <option value="maths">🔢 Ganit (Maths)</option>
            <option value="reasoning">🧠 Reasoning</option>
            <option value="english">📝 English</option>
            <option value="hindi">🔤 Hindi</option>
          </select>
        </div>
        <div class="setting-group">
          <div class="setting-label">Language</div>
          <select class="setting-select" id="langSelect">
            <option value="hindi">हिंदी</option>
            <option value="english">English</option>
            <option value="hinglish">Hinglish</option>
          </select>
        </div>
      </div>

      <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>
        🚀 Quiz Shuru Karein
      </button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="quiz-area" id="quizArea">
    <button class="back-btn" onclick="goBack()">← Wapas Jao</button>
    <div class="quiz-header">
      <div class="quiz-info">
        <div class="exam-tag" id="quizExamTag"></div>
        <div class="diff-tag" id="quizDiffTag"></div>
        <div class="q-topic" id="quizTopicTag" style="padding:4px 10px;border-radius:20px;"></div>
      </div>
      <div class="score-display">
        <div class="sc g">✅ <span id="scoreCorrect">0</span></div>
        <div class="sc r">❌ <span id="scoreWrong">0</span></div>
        <div class="sc b">🎯 <span id="scoreAcc">0</span>%</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text">Sawal <span id="qNum">1</span> — AI se aur aa rahe hain...</div>
    </div>
    <div id="streakArea"></div>
    <div id="questionArea"></div>
  </div>
</div>

<script>
var EXAMS = [
  {name:"UPSC", icon:"🏛️", full:"UPSC Civil Services IAS IPS IFS"},
  {name:"BPSC", icon:"📜", full:"BPSC Bihar Public Service Commission"},
  {name:"SSC CGL", icon:"🗂️", full:"SSC CGL Staff Selection Commission Combined Graduate Level"},
  {name:"SSC CHSL", icon:"📋", full:"SSC CHSL Combined Higher Secondary Level"},
  {name:"SSC MTS", icon:"📝", full:"SSC MTS Multi Tasking Staff"},
  {name:"Railway NTPC", icon:"🚂", full:"Railway NTPC Non Technical Popular Categories RRB"},
  {name:"Railway Group D", icon:"🛤️", full:"Railway Group D RRB RRC"},
  {name:"UP Police", icon:"👮", full:"UP Police Constable SI Sub Inspector"},
  {name:"Bihar Police", icon:"🚔", full:"Bihar Police Constable SI"},
  {name:"Bank PO", icon:"🏦", full:"Bank PO IBPS SBI Probationary Officer"},
  {name:"Bank Clerk", icon:"💳", full:"Bank Clerk IBPS SBI Office Assistant"},
  {name:"UPTET", icon:"📚", full:"UPTET Uttar Pradesh Teacher Eligibility Test"},
  {name:"CTET", icon:"🎓", full:"CTET Central Teacher Eligibility Test"},
  {name:"NDA", icon:"⚔️", full:"NDA National Defence Academy Army Navy Air Force"},
  {name:"CDS", icon:"🎖️", full:"CDS Combined Defence Services"},
  {name:"MPSC", icon:"🔷", full:"MPSC Maharashtra Public Service Commission"},
  {name:"RPSC", icon:"🔶", full:"RPSC Rajasthan Public Service Commission"},
  {name:"MPPSC", icon:"🔸", full:"MPPSC Madhya Pradesh Public Service Commission"},
  {name:"JPSC", icon:"📌", full:"JPSC Jharkhand Public Service Commission"},
  {name:"UKPSC", icon:"🏔️", full:"UKPSC Uttarakhand Public Service Commission"},
  {name:"UPPSC", icon:"📜", full:"UPPSC Uttar Pradesh Public Service Commission"},
  {name:"HPSC", icon:"🌾", full:"HPSC Haryana Public Service Commission"},
  {name:"PPSC", icon:"🌟", full:"PPSC Punjab Public Service Commission"},
  {name:"WBPSC", icon:"🐯", full:"WBPSC West Bengal Public Service Commission"},
  {name:"MHCET", icon:"⚕️", full:"MHCET Maharashtra Common Entrance Test"},
  {name:"NEET", icon:"🏥", full:"NEET National Eligibility cum Entrance Test Medical"},
  {name:"JEE", icon:"⚙️", full:"JEE Joint Entrance Examination Engineering IIT"},
  {name:"CLAT", icon:"⚖️", full:"CLAT Common Law Admission Test"},
  {name:"CAT", icon:"📊", full:"CAT Common Admission Test MBA IIM"},
  {name:"CUET", icon:"🎓", full:"CUET Common University Entrance Test"},
];

var selectedExam = null;
var currentQ = null;
var selected = null;
var submitted = false;
var qCount = 0;
var correct = 0;
var wrong = 0;
var streak = 0;
var bestStreak = 0;
var isLoading = false;

function renderExamGrid(filter) {
  var grid = document.getElementById('examGrid');
  var list = filter ? EXAMS.filter(function(e){
    return e.name.toLowerCase().includes(filter.toLowerCase()) || e.full.toLowerCase().includes(filter.toLowerCase());
  }) : EXAMS;
  grid.innerHTML = list.map(function(e){
    return '<button class="exam-btn'+(selectedExam===e.name?' active':'')+ '" onclick="selectExam(\''+e.name+'\',\''+e.full+'\')">' +
      '<span class="exam-icon">'+e.icon+'</span>' +
      '<span class="exam-name">'+e.name+'</span></button>';
  }).join('');
}

function filterExams(val) {
  if(val.length > 0) {
    selectedExam = val;
    document.getElementById('startBtn').disabled = false;
  }
  renderExamGrid(val);
}

function selectExam(name, full) {
  selectedExam = name;
  document.getElementById('examInput').value = name;
  document.getElementById('startBtn').disabled = false;
  renderExamGrid('');
  document.querySelectorAll('.exam-btn').forEach(function(b){
    b.classList.toggle('active', b.querySelector('.exam-name').textContent === name);
  });
}

function startQuiz() {
  if(!selectedExam) return;
  document.getElementById('selectorArea').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  qCount = 0; correct = 0; wrong = 0; streak = 0; bestStreak = 0;
  var diff = document.getElementById('diffSelect').value;
  var topic = document.getElementById('topicSelect').value;
  var diffLabel = {easy:'🟢 Aasaan',medium:'🟡 Madhyam',hard:'🔴 Kathin',mixed:'🎲 Mixed'}[diff];
  var diffClass = {easy:'diff-easy',medium:'diff-medium',hard:'diff-hard',mixed:'diff-easy'}[diff];
  document.getElementById('quizExamTag').textContent = '🎯 '+selectedExam;
  document.getElementById('quizDiffTag').className = 'diff-tag '+diffClass;
  document.getElementById('quizDiffTag').textContent = diffLabel;
  document.getElementById('quizTopicTag').textContent = topic === 'all' ? '📚 Sab Topics' : topic;
  updateScore();
  loadQuestion();
}

function goBack() {
  document.getElementById('selectorArea').style.display = 'block';
  document.getElementById('quizArea').style.display = 'none';
}

function updateScore() {
  var total = correct + wrong;
  var acc = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent = wrong;
  document.getElementById('scoreAcc').textContent = acc;
  document.getElementById('qNum').textContent = qCount + 1;
  var pct = Math.min(qCount * 2, 100);
  document.getElementById('progressFill').style.width = pct + '%';
  var sa = document.getElementById('streakArea');
  sa.innerHTML = streak >= 3 ? '<div class="streak-banner">🔥 '+streak+' sahi jawab streak! Zabardast chal rahe ho!</div>' : '';
}

async function loadQuestion() {
  if(isLoading) return;
  isLoading = true;
  selected = null; submitted = false;
  var qa = document.getElementById('questionArea');
  qa.innerHTML = '<div class="loading-card"><div class="loading-spinner"></div><div class="loading-text">AI question bana raha hai...</div><div class="loading-sub">'+selectedExam+' ke pattern ke according</div><div class="ai-thinking"><span></span><span></span><span></span></div></div>';

  var diff = document.getElementById('diffSelect').value;
  var topic = document.getElementById('topicSelect').value;
  var lang = document.getElementById('langSelect').value;
  var exam = document.getElementById('examInput').value || selectedExam;

  var examFull = EXAMS.find(function(e){return e.name===selectedExam;});
  var examDesc = examFull ? examFull.full : exam;

  var langInstr = lang === 'hindi' ? 'Question aur options Hindi mein likho.' : lang === 'english' ? 'Write question and options in English.' : 'Question Hinglish mein likho (Hindi + English mix).';
  var diffInstr = diff === 'easy' ? 'Easy/Prelims level — basic factual question.' : diff === 'medium' ? 'Medium/Mains level — analytical question.' : diff === 'hard' ? 'Hard/Advanced level — tricky conceptual question.' : 'Any difficulty level.';
  var topicInstr = topic === 'all' ? 'Any topic relevant to this exam.' : 'Topic: '+topic+' only.';

  var prompt = 'Generate exactly 1 multiple choice question for ' + examDesc + ' exam.\n' +
    langInstr + '\n' + diffInstr + '\n' + topicInstr + '\n' +
    'Return ONLY valid JSON in this exact format, nothing else:\n' +
    '{"q":"question text","o":["option A","option B","option C","option D"],"a":0,"topic":"topic name","explanation":"brief explanation in same language"}\n' +
    'a is 0-indexed correct answer index. Make it realistic exam-style question. No markdown, no extra text.';

  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key': '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',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{role:'user',content:prompt}]
      })
    });
    var data = await resp.json();
    var text = data.content[0].text.trim();
    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('Invalid JSON');
    var qdata = JSON.parse(jsonMatch[0]);
    if(!qdata.q || !qdata.o || qdata.o.length < 2) throw new Error('Invalid question format');
    currentQ = qdata;
    qCount++;
    updateScore();
    renderQuestion(qdata);
  } catch(err) {
    qa.innerHTML = '<div class="error-card">⚠️ AI se question load karne mein error aaya. Internet check karein aur retry karein.<br><br><button onclick="loadQuestion()" style="padding:8px 16px;background:#ef4444;border:none;border-radius:6px;color:#fff;cursor:pointer;font-weight:600;">🔄 Dobara Try Karein</button></div>';
  }
  isLoading = false;
}

function renderQuestion(q) {
  var qa = document.getElementById('questionArea');
  var letrs = ['A','B','C','D','E'];
  var optsHtml = q.o.map(function(opt, i){
    return '<button class="opt" id="opt'+i+'" onclick="selectOpt('+i+')"><span class="opt-letter">'+letrs[i]+'</span>'+opt+'</button>';
  }).join('');

  qa.innerHTML = '<div class="q-card">' +
    '<div class="q-card-top">' +
      '<div class="q-num-row"><div class="q-num">Sawal #'+qCount+'</div><div class="q-topic">'+q.topic+'</div></div>' +
      '<div class="q-text">'+q.q+'</div>' +
    '</div>' +
    '<div class="q-options">'+optsHtml+'</div>' +
    '<div id="explanationArea"></div>' +
    '<div class="action-row">' +
      '<button class="submit-btn" id="submitBtn" onclick="submitAnswer()" disabled>Submit ✓</button>' +
      '<button class="next-btn" id="nextBtn" onclick="loadQuestion()" style="display:none">Agla Sawal →</button>' +
      '<button class="skip-btn" onclick="loadQuestion()">Skip ⟶</button>' +
    '</div>' +
  '</div>';
}

function selectOpt(i) {
  if(submitted) return;
  selected = i;
  document.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('selected'); });
  var el = document.getElementById('opt'+i);
  if(el) el.classList.add('selected');
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if(selected === null || submitted || !currentQ) return;
  submitted = true;
  var isCorrect = selected === currentQ.a;
  if(isCorrect){ correct++; streak++; if(streak>bestStreak) bestStreak=streak; }
  else { wrong++; streak=0; }
  updateScore();
  document.querySelectorAll('.opt').forEach(function(o,i){
    o.disabled = true;
    if(i === currentQ.a) o.classList.add('correct');
    else if(i === selected && !isCorrect) o.classList.add('wrong');
    var letter = o.querySelector('.opt-letter');
    if(i === currentQ.a) letter.style.background = '#22c55e';
    else if(i === selected && !isCorrect) letter.style.background = '#ef4444';
  });
  document.getElementById('explanationArea').innerHTML =
    '<div class="q-explanation">'+
    (isCorrect ? '✅ <strong>Sahi!</strong> ' : '❌ <strong>Galat.</strong> Sahi jawab: <strong>'+currentQ.o[currentQ.a]+'</strong><br>') +
    '💡 ' + currentQ.explanation + '</div>';
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'flex';
  document.getElementById('nextBtn').textContent = '🤖 AI se Agla Sawal →';
}

// Init
renderExamGrid('');
</script>
</body>
</html>
